# Faithful-regime RFLO run config (dt=1, N=200). One seed per invocation — pass
# --seed at the CLI to override. RFLO (Murray 2019) is the third learning rule on the
# SAME architecture as BPTT and PC: local in time and space, single-pass online. The
# reconstruction constants (w_m, threshold, ramp_a, ramp_A) are UNVALIDATED knobs to
# sweep, not settled values (AGENTS.md). Regenerate: python -c "from
# src.training.config import Config; Config.faithful(rule='rflo').to_yaml(
# 'configs/rflo.yaml')". Reduced smoke uses `--regime reduced` flags instead.
#
# !! ramp_A DIVERGES FROM configs/bptt.yaml AND configs/pc.yaml — READ BEFORE A SWEEP !!
# This file carries ramp_A: 1.2, the current code default. Both sibling configs still
# pin the older ramp_A: 3.0, a value src/training/config.py records as having failed to
# converge even for BPTT. A three-arm comparison launched from these three YAML files
# would therefore train the arms against DIFFERENT ramp targets, which invalidates the
# contrast at its root. Regenerate bptt.yaml and pc.yaml (same one-liner, swapping the
# rule) before any cross-arm run — or launch all three via `--regime faithful --rule X`,
# which bypasses the YAMLs and is already self-consistent.
rule: rflo
seed: 0
N: 200
dt: 1.0
tau: 10.0
noise_sd: 0.01
g: 1.0
task_source: neurogym
pulse_height: 0.4
pulse_width: 83.0
ready_onset: 100.0
total_time: 3000.0
prod_hold: 300.0
w_m: 0.05
threshold: 1.0
ramp_a: 2.8
ramp_A: 1.2
lr: 0.001
n_iter: 6000
batch: 64
grad_clip: 1.0
pc_inference_steps: 20
pc_inference_lr: 0.1
pc_optimizer: adam
pc_clip_mode: global_norm
rflo_feedback: random
rflo_feedback_scale: 0.0
rflo_optimizer: adam
rflo_clip_mode: global_norm
n_seeds: 10
prior_context:
  short: 0.3
  long: 0.4
effector_context:
  eye: -0.2
  hand: 0.2
