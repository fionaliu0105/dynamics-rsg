# Faithful-regime BPTT run config (dt=1, N=200). One seed per invocation — pass
# --seed at the CLI to override. The reconstruction constants (w_m, threshold,
# ramp_a, ramp_A) are UNVALIDATED knobs to sweep, not settled values (AGENTS.md).
# Regenerate: python -c "from src.training.config import Config;
# Config.faithful(rule='bptt').to_yaml('configs/bptt.yaml')". Reduced smoke uses
# `--regime reduced` flags instead of this file.
rule: bptt
seed: 0
N: 200
dt: 1.0
tau: 10.0
noise_sd: 0.01
g: 1.0
task_source: neurogym
pulse_height: 0.4
pulse_width: 83.0
ready_onset: 100.0
total_time: 3000.0
prod_hold: 300.0
w_m: 0.05
threshold: 1.0
ramp_a: 2.8
ramp_A: 3.0
lr: 0.001
n_iter: 6000
batch: 64
grad_clip: 1.0
pc_inference_steps: 20
pc_inference_lr: 0.1
pc_normalize: true
pc_grad_clip: 1.0
n_seeds: 10
prior_context:
  short: 0.3
  long: 0.4
effector_context:
  eye: -0.2
  hand: 0.2
